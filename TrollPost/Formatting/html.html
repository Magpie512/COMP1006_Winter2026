<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feed | TrollPost</title>
    <link rel="stylesheet" href="styles/Normalize.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="icon" type="image/png" href="img/gob.png">
    <link rel="stylesheet" href="css.css?v=1.5"> <!-- Cache-busting query parameter -->
</head>

<body>
<header class="header">
    <img src="img/gob.png" class="logo">
    <h1 class="embossed"> TrollPost </h1>
    <input type="text" id="searchBar" placeholder="Scry?" class="form-control">
    <button id="signin" class="btn btn-primary"> Sign In </button>
    <button id="signup" class="btn btn-secondary"> Sign Up </button>
</header>

<main class="layout">
    <section id="HOTWContainer" class="leftSide">
        <h2> <abbr title="Heroes of the Week">H.O.T.W</abbr> </h2> 
        <div id="Hero1" class="HeroCard">
            <h3> Hero 1 </h3>
            <p> Description of Hero 1 </p>
        </div>
        <div id="Hero2" class="HeroCard">
            <h3> Hero 2 </h3>
            <p> Description of Hero 2 </p>
        </div>
        <div id="Hero3" class="HeroCard">
            <h3> Hero 3 </h3>
            <p> Description of Hero 3 </p>
        </div>
    </section>
    
    <section id="PostsContainer" class="body">
        <button id="CreatePost"> Create Post </button>
        <form action="process.php" method="post" id="PostForm">
            <label for="PostContent"> Your Post: </label>
            <textarea id="PostContent" name="PostContent" rows="4" cols="50" maxlength="500" placeholder="Write your troll post here..."></textarea>
            <br>
            <input type="submit" value="Submit Post">
        </form>

        <h2>Postings</h2>

    </section>

    <aside id="TrendingContainer" class="rightSide">
        <h3>Trending</h3>
    </aside>

    <aside id="AdvertContainer" class="rightSide">
        <h3>Advertisements</h3> <!-- Joke advert for the gnome emporium -->
    </aside>
</main> 


<footer>
    <p>&copy; 136AC Troll Post </p>
    <p>The Guild of Aetheric Transport</p>
    <p>Really made by Mara Briggs</p>
</footer>
</body>
</html>
